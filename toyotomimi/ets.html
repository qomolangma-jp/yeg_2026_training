<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜怒哀楽トークシステム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 背景色変更のプレビューを滑らかにするアニメーション */
        .transition-bg {
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="transition-bg bg-slate-950 text-white min-h-screen flex flex-col justify-between items-center p-6 font-sans overflow-hidden">

    <header class="text-center pt-4 opacity-60">
        <h1 class="text-sm tracking-widest font-bold uppercase">Emotion Talk Session</h1>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center w-full max-w-4xl text-center px-4">
        <div id="emotion-badge" class="hidden text-3xl md:text-5xl font-extrabold tracking-wider px-8 py-3 rounded-full bg-white/20 backdrop-blur-md mb-8 shadow-lg animate-bounce">
            --
        </div>
        
        <div id="theme-text" class="text-2xl md:text-5xl lg:text-6xl font-black leading-snug md:leading-relaxed drop-shadow-md max-w-3xl min-h-[150px] flex items-center justify-center">
            ボタンを押すと、スプレッドシートからお題がランダムに飛び出します！
        </div>
    </main>

    <footer class="w-full max-w-md text-center pb-12 px-4 z-10">
        <button id="draw-btn" disabled
            class="w-full bg-white text-slate-950 font-black text-xl md:text-2xl py-5 px-8 rounded-2xl shadow-2xl hover:bg-slate-100 hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
            データを読み込み中...
        </button>
        <p id="status-message" class="text-xs mt-3 opacity-50"></p>
    </footer>

    <script>
        // ==========================================
        // 【設定】ここにスプレッドシートのCSV URLを入力してください
        // ==========================================
        const SPREADSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsW-zaAFEPl48lcRUR45SIpH9yZnTWQsumiQ1CCGnuTNoosYKDfIgtzY_BtfvPR_VbmyXAdJZVbaux/pub?gid=0&single=true&output=csv'; 

        // 感情ごとのデザイン定義（喜＝緑、怒＝赤、哀＝青、楽＝黄）
        const EMOTION_THEMES = {
            '喜': { bg: 'bg-emerald-600', text: 'text-white' },
            '怒': { bg: 'bg-rose-600', text: 'text-white' },
            '哀': { bg: 'bg-indigo-700', text: 'text-white' },
            '楽': { bg: 'bg-amber-500', text: 'text-slate-950' }, // 黄色は視認性確保のため文字を黒っぽく
            '初期': { bg: 'bg-slate-950', text: 'text-white' }
        };

        let loadedThemes = []; // 読み込まれたお題データ

        // 要素の取得
        const emotionBadge = document.getElementById('emotion-badge');
        const themeText = document.getElementById('theme-text');
        const drawBtn = document.getElementById('draw-btn');
        const statusMessage = document.getElementById('status-message');
        const body = document.body;

        // ページ読み込み時にデータを非同期取得
        window.addEventListener('DOMContentLoaded', async () => {
            if (SPREADSHEET_CSV_URL === 'YOUR_SPREADSHEET_CSV_URL_HERE') {
                themeText.innerHTML = '<span class="text-red-400 text-xl">【設定エラー】<br>コード内の「SPREADSHEET_CSV_URL」に<br>スプレッドシートのCSV URLを設定してください。</span>';
                drawBtn.innerText = '設定を確認してください';
                return;
            }

            try {
                statusMessage.innerText = 'スプレッドシートからデータを同期中...';
                const response = await fetch(SPREADSHEET_CSV_URL);
                if (!response.ok) throw new Error('データの取得に失敗しました');
                
                const csvText = await response.text();
                loadedThemes = parseCSV(csvText);

                if (loadedThemes.length === 0) {
                    throw new Error('有効なデータが見つかりませんでした');
                }

                // ボタンを利用可能にする
                drawBtn.innerText = 'お題を引く！';
                drawBtn.removeAttribute('disabled');
                statusMessage.innerText = `準備完了！（現在のお題数: ${loadedThemes.length}件）`;

            } catch (error) {
                console.error(error);
                themeText.innerHTML = `<span class="text-red-400 text-xl">通信エラーが発生しました。<br>スプレッドシートの「ウェブに公開」設定や<br>URLが正しいか確認してください。</span>`;
                drawBtn.innerText = '読み込み失敗';
                statusMessage.innerText = error.message;
            }
        });

        // ボタンが押された時の処理
        drawBtn.addEventListener('click', () => {
            if (loadedThemes.length === 0) return;

            // ランダムに1行抽出
            const randomIndex = Math.floor(Math.random() * loadedThemes.length);
            const selected = loadedThemes[randomIndex];

            // 画面表示の更新
            emotionBadge.innerText = selected.emotion;
            emotionBadge.classList.remove('hidden');
            themeText.innerText = selected.text;

            // 背景色とテーマのダイナミック変更
            const theme = EMOTION_THEMES[selected.emotion] || EMOTION_THEMES['初期'];
            
            // 背景色クラスをリセットして再適用
            body.className = 'transition-bg min-h-screen flex flex-col justify-between items-center p-6 font-sans overflow-hidden ' + theme.bg;
            
            // 感情バッジ内の文字色調整（「楽」の時だけ文字を暗くする等の対応）
            if (selected.emotion === '楽') {
                emotionBadge.className = 'text-3xl md:text-5xl font-extrabold tracking-wider px-8 py-3 rounded-full bg-slate-950/10 backdrop-blur-md mb-8 shadow-lg animate-bounce text-slate-950';
            } else {
                emotionBadge.className = 'text-3xl md:text-5xl font-extrabold tracking-wider px-8 py-3 rounded-full bg-white/20 backdrop-blur-md mb-8 shadow-lg animate-bounce text-white';
            }
        });

        // カンマやお題の中のクォーテーションを考慮したCSVパース関数
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const results = [];

            // 1行目はヘッダー（Sort, 感情, お題）なのでi=1から開始
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // 簡易的なCSVクォート対応パース
                const row = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                row.push(current);

                // 各要素の不要なダブルクォーテーションをトリム
                const cleanRow = row.map(val => val.replace(/^"|"$/g, '').trim());

                // B列（感情）とC列（お題）が存在することを確認
                if (cleanRow.length >= 3) {
                    results.push({
                        emotion: cleanRow[1], // B列：感情
                        text: cleanRow[2]     // C列：お題
                    });
                }
            }
            return results;
        }
    </script>
</body>
</html>
